apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: language-tutor-data
  namespace: language-tutor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Omitted storageClassName → falls back to the cluster default
  # (your homelab uses local-path-provisioner; that's fine).
